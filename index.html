<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Whiteboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #e8e4df;
  --tb: #1c1c1e;
  --acc: #ff6b35;
  --sep: #2e2e30;
  --font: 'DM Sans', sans-serif;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:var(--font); touch-action:none; user-select:none; -webkit-user-select:none; }

#tbWrap {
  position:fixed; top:12px; left:50%; transform:translateX(-50%);
  max-width:calc(100vw - 16px);
  z-index:200;
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  overflow:hidden;
}
#toolbar {
  height:52px; background:var(--tb);
  display:flex; align-items:center; gap:3px; padding:0 12px;
  overflow-x:auto; overflow-y:hidden;
  scrollbar-width:none; -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
  border:1px solid rgba(255,255,255,.06); border-radius:16px;
  touch-action:pan-x;
}
#toolbar::-webkit-scrollbar { display:none; }
.logo { font-size:12px; font-weight:500; color:rgba(255,255,255,.3); letter-spacing:.1em; text-transform:uppercase; padding-right:10px; border-right:1px solid var(--sep); margin-right:4px; white-space:nowrap; flex-shrink:0; }
.sep  { width:1px; height:26px; background:var(--sep); margin:0 3px; flex-shrink:0; }
.tb { width:34px; height:34px; border:none; background:transparent; color:rgba(255,255,255,.5); border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:background .12s,color .12s; flex-shrink:0; }
.tb:hover  { background:#2c2c2e; color:#fff; }
.tb.active { background:var(--acc); color:#fff; }
#sizeSlider { -webkit-appearance:none; width:64px; height:3px; border-radius:2px; background:#3a3a3c; outline:none; cursor:pointer; flex-shrink:0; }
#sizeSlider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--acc); }
.sw { width:19px; height:19px; border-radius:50%; border:2px solid transparent; cursor:pointer; flex-shrink:0; transition:transform .1s,border-color .1s; }
.sw:hover { transform:scale(1.25); }
.sw.active { border-color:rgba(255,255,255,.85); }
#cpick { width:24px; height:24px; border-radius:50%; border:2px solid #555; padding:0; background:none; overflow:hidden; cursor:pointer; flex-shrink:0; }
#cpick::-webkit-color-swatch-wrapper { padding:0; }
#cpick::-webkit-color-swatch { border:none; border-radius:50%; }
#pdfBtn { padding:0 13px; height:32px; border:none; background:var(--acc); color:#fff; border-radius:8px; font-family:var(--font); font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:5px; white-space:nowrap; flex-shrink:0; letter-spacing:.02em; transition:opacity .15s; }
#pdfBtn:hover { opacity:.85; }

#stage { position:fixed; inset:0; overflow:hidden; touch-action:none; cursor:crosshair; }
#display { position:absolute; top:0; left:0; will-change:transform; }

#hud { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; z-index:200; pointer-events:none; }
#zoomPill { background:rgba(28,28,30,.88); color:rgba(255,255,255,.6); font-family:var(--font); font-size:11px; font-weight:500; padding:6px 12px; border-radius:30px; opacity:0; transition:opacity .4s; border:1px solid rgba(255,255,255,.08); letter-spacing:.06em; }
#palmPill { background:rgba(255,107,53,.18); color:#ff6b35; font-family:var(--font); font-size:11px; font-weight:500; padding:6px 12px; border-radius:30px; opacity:0; transition:opacity .3s; border:1px solid rgba(255,107,53,.3); letter-spacing:.04em; }

#dot { position:fixed; pointer-events:none; border-radius:50%; transform:translate(-50%,-50%); z-index:999; opacity:0; transition:width .08s,height .08s,opacity .1s; }

#pdfOv { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:14px; backdrop-filter:blur(4px); }
#pdfOv.show { display:flex; }
#pdfOv .sp { width:34px; height:34px; border:3px solid rgba(255,255,255,.2); border-top-color:var(--acc); border-radius:50%; animation:spin .7s linear infinite; }
#pdfOv .ms { color:#fff; font-family:var(--font); font-size:15px; font-weight:500; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="tbWrap"><div id="toolbar">
  <span class="logo">Board</span>
  <button class="tb active" id="tPen" title="Pen (P)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
  <button class="tb" id="tMark" title="Marker (M)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg></button>
  <button class="tb" id="tErase" title="Eraser (E)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></button>
  <button class="tb" id="tLine" title="Line (L)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg></button>
  <button class="tb" id="tRect" title="Rectangle (R)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
  <button class="tb" id="tCirc" title="Circle (C)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></button>
  <div class="sep"></div>
  <svg width="9" height="9" viewBox="0 0 9 9" style="color:rgba(255,255,255,.3);flex-shrink:0"><circle cx="4.5" cy="4.5" r="2" fill="currentColor"/></svg>
  <input type="range" id="sizeSlider" min="1" max="40" value="3">
  <svg width="11" height="11" viewBox="0 0 11 11" style="color:rgba(255,255,255,.3);flex-shrink:0"><circle cx="5.5" cy="5.5" r="5" fill="currentColor"/></svg>
  <div class="sep"></div>
  <div class="sw active" style="background:#111" data-c="#111111"></div>
  <div class="sw" style="background:#e63946" data-c="#e63946"></div>
  <div class="sw" style="background:#2196f3" data-c="#2196f3"></div>
  <div class="sw" style="background:#2ecc71" data-c="#2ecc71"></div>
  <div class="sw" style="background:#ff9800" data-c="#ff9800"></div>
  <div class="sw" style="background:#9c27b0" data-c="#9c27b0"></div>
  <input type="color" id="cpick" value="#111111">
  <div class="sep"></div>
  <button class="tb" id="bUndo" title="Undo (Ctrl+Z)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
  <button class="tb" id="bRedo" title="Redo (Ctrl+Y)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
  <button class="tb" id="bClear" title="Clear board"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
  <div class="sep"></div>
  <button id="pdfBtn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export PDF</button>
</div></div>

<div id="stage"><canvas id="display"></canvas></div>

<div id="hud">
  <div id="palmPill">✋ Palm ignored</div>
  <div id="zoomPill">100%</div>
</div>
<div id="dot"></div>

<div id="pdfOv">
  <div class="sp"></div>
  <div class="ms">Generating PDF…</div>
</div>

<script>
// ═══════════════════════════════
//  TILE ENGINE
//  Infinite canvas via 512×512 offscreen tiles.
//  No resize copies — tiles are created on demand.
// ═══════════════════════════════
const TILE = 512;
const tiles = {};   // "tx,ty" → { canvas, ctx }

function tKey(tx, ty) { return tx + ',' + ty; }

function getTile(tx, ty) {
  const k = tKey(tx, ty);
  if (!tiles[k]) {
    const c = (typeof OffscreenCanvas !== 'undefined')
      ? new OffscreenCanvas(TILE, TILE)
      : Object.assign(document.createElement('canvas'), { width: TILE, height: TILE });
    const g = c.getContext('2d');
    g.fillStyle = '#ffffff';
    g.fillRect(0, 0, TILE, TILE);
    tiles[k] = { canvas: c, ctx: g };
  }
  return tiles[k];
}

// ═══════════════════════════════
//  DISPLAY / RENDER LOOP
// ═══════════════════════════════
const stage   = document.getElementById('stage');
const display = document.getElementById('display');
const dCtx    = display.getContext('2d');

let vpW = 0, vpH = 0;
let camX = -200, camY = -150;
let zoom = 1;
let dirty = true;

function resize() {
  vpW = window.innerWidth;
  vpH = window.innerHeight;
  display.width  = vpW;
  display.height = vpH;
  dirty = true;
}
window.addEventListener('resize', resize);
resize();

function render() {
  requestAnimationFrame(render);
  if (!dirty) return;
  dirty = false;

  dCtx.clearRect(0, 0, vpW, vpH);

  const tx0 = Math.floor(camX / TILE);
  const ty0 = Math.floor(camY / TILE);
  const tx1 = Math.ceil((camX + vpW / zoom) / TILE);
  const ty1 = Math.ceil((camY + vpH / zoom) / TILE);

  dCtx.save();
  dCtx.scale(zoom, zoom);
  dCtx.translate(-camX, -camY);

  // Background (dot grid) — drawn procedurally, no extra canvas
  const GS = 40;
  const gx0 = Math.floor(camX / GS) * GS;
  const gy0 = Math.floor(camY / GS) * GS;
  dCtx.fillStyle = '#d0cbc5';
  for (let gx = gx0; gx < camX + vpW / zoom + GS; gx += GS)
    for (let gy = gy0; gy < camY + vpH / zoom + GS; gy += GS) {
      dCtx.beginPath(); dCtx.arc(gx, gy, 1.1 / zoom, 0, Math.PI * 2); dCtx.fill();
    }

  // Tiles (white canvas with ink on top)
  for (let ty = ty0; ty <= ty1; ty++)
    for (let tx = tx0; tx <= tx1; tx++)
      dCtx.drawImage(getTile(tx, ty).canvas, tx * TILE, ty * TILE);

  // Shape preview
  if (shapePreview) {
    dCtx.save();
    styleCtx(dCtx);
    drawShapeOn(dCtx, shapePreview.x1, shapePreview.y1, shapePreview.x2, shapePreview.y2);
    dCtx.restore();
  }

  dCtx.restore();
}
render();

// ═══════════════════════════════
//  TOOL STATE
// ═══════════════════════════════
let tool  = 'pen';
let color = '#111111';
let size  = 3;

function styleCtx(c) {
  c.lineCap = 'round'; c.lineJoin = 'round';
  if (tool === 'eraser') {
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = '#ffffff'; c.fillStyle = '#ffffff';
    c.lineWidth = size * 5; c.globalAlpha = 1;
  } else if (tool === 'marker') {
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = color; c.fillStyle = color;
    c.lineWidth = size * 4; c.globalAlpha = 0.3;
  } else {
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = color; c.fillStyle = color;
    c.lineWidth = (tool === 'pen') ? size : size * 1.5; c.globalAlpha = 1;
  }
}

function strokeLW() {
  return (tool === 'eraser') ? size * 5 : (tool === 'marker') ? size * 4 : size;
}

// Tiles touched by a circular area in world coords
function touchedTiles(wx, wy, r) {
  const tx0 = Math.floor((wx - r) / TILE), ty0 = Math.floor((wy - r) / TILE);
  const tx1 = Math.floor((wx + r) / TILE), ty1 = Math.floor((wy + r) / TILE);
  const out = [];
  for (let ty = ty0; ty <= ty1; ty++)
    for (let tx = tx0; tx <= tx1; tx++) out.push([tx, ty]);
  return out;
}

function paintDot(wx, wy) {
  const r = strokeLW() / 2 + 1;
  for (const [tx, ty] of touchedTiles(wx, wy, r)) {
    const t = getTile(tx, ty);
    const ox = tx * TILE, oy = ty * TILE;
    t.ctx.save(); styleCtx(t.ctx);
    t.ctx.beginPath(); t.ctx.arc(wx - ox, wy - oy, strokeLW() / 2, 0, Math.PI * 2); t.ctx.fill();
    t.ctx.restore();
  }
  dirty = true;
}

function paintSeg(wx1, wy1, wx2, wy2) {
  const r = strokeLW() / 2 + 2;
  const bx0 = Math.min(wx1,wx2)-r, by0 = Math.min(wy1,wy2)-r;
  const bx1 = Math.max(wx1,wx2)+r, by1 = Math.max(wy1,wy2)+r;
  const tx0=Math.floor(bx0/TILE),ty0=Math.floor(by0/TILE);
  const tx1=Math.floor(bx1/TILE),ty1=Math.floor(by1/TILE);
  for (let ty=ty0;ty<=ty1;ty++) for (let tx=tx0;tx<=tx1;tx++) {
    const t = getTile(tx,ty); const ox=tx*TILE,oy=ty*TILE;
    t.ctx.save(); styleCtx(t.ctx);
    t.ctx.beginPath(); t.ctx.moveTo(wx1-ox,wy1-oy); t.ctx.lineTo(wx2-ox,wy2-oy); t.ctx.stroke();
    t.ctx.restore();
  }
  dirty = true;
}

function paintShape(x1,y1,x2,y2) {
  const r = size*2+4;
  const bx0=Math.min(x1,x2)-r,by0=Math.min(y1,y2)-r;
  const bx1=Math.max(x1,x2)+r,by1=Math.max(y1,y2)+r;
  const tx0=Math.floor(bx0/TILE),ty0=Math.floor(by0/TILE);
  const tx1=Math.floor(bx1/TILE),ty1=Math.floor(by1/TILE);
  for (let ty=ty0;ty<=ty1;ty++) for (let tx=tx0;tx<=tx1;tx++) {
    const t=getTile(tx,ty); const ox=tx*TILE,oy=ty*TILE;
    t.ctx.save(); styleCtx(t.ctx); t.ctx.lineWidth=size*1.5;
    drawShapeOn(t.ctx,x1-ox,y1-oy,x2-ox,y2-oy);
    t.ctx.restore();
  }
  dirty = true;
}

function drawShapeOn(c,x1,y1,x2,y2) {
  c.beginPath();
  if      (tool==='line')   { c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); }
  else if (tool==='rect')   { c.strokeRect(x1,y1,x2-x1,y2-y1); }
  else if (tool==='circle') { const rx=(x2-x1)/2,ry=(y2-y1)/2; c.ellipse(x1+rx,y1+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); c.stroke(); }
}

// ═══════════════════════════════
//  UNDO / REDO  (tile snapshots)
// ═══════════════════════════════
let undoStack = [], redoStack = [];

function snapTiles(keys) {
  const s = {};
  for (const k of keys) if (tiles[k]) s[k] = tiles[k].ctx.getImageData(0,0,TILE,TILE);
  return s;
}
function applySnap(snap) {
  for (const k in snap) {
    const [tx,ty]=k.split(',').map(Number);
    getTile(tx,ty).ctx.putImageData(snap[k],0,0);
  }
  dirty=true;
}

let strokeBefore=null, strokeKeys=new Set();

function beginStroke(wx,wy) {
  strokeKeys=new Set();
  const r=strokeLW()/2+2;
  for(const[tx,ty]of touchedTiles(wx,wy,r)) strokeKeys.add(tKey(tx,ty));
  strokeBefore=snapTiles([...strokeKeys]);
}
function addStrokeTiles(wx,wy){
  const r=strokeLW()/2+2;
  for(const[tx,ty]of touchedTiles(wx,wy,r)){
    const k=tKey(tx,ty);
    if(!strokeKeys.has(k)){
      // snapshot this tile before first touch
      if(tiles[k]) strokeBefore[k]=tiles[k].ctx.getImageData(0,0,TILE,TILE);
      strokeKeys.add(k);
    }
  }
}
function commitStroke(){
  if(!strokeBefore) return;
  const after=snapTiles([...strokeKeys]);
  undoStack.push({before:strokeBefore,after});
  if(undoStack.length>40) undoStack.shift();
  redoStack=[]; strokeBefore=null;
}

function undo(){
  if(!undoStack.length) return;
  const e=undoStack.pop(); applySnap(e.before); redoStack.push(e);
}
function redo(){
  if(!redoStack.length) return;
  const e=redoStack.pop(); applySnap(e.after); undoStack.push(e);
}

function clearAll(){
  const snap={}; for(const k in tiles) snap[k]=tiles[k].ctx.getImageData(0,0,TILE,TILE);
  undoStack.push({before:snap,after:'clear'}); if(undoStack.length>40) undoStack.shift(); redoStack=[];
  for(const k in tiles){ tiles[k].ctx.fillStyle='#fff'; tiles[k].ctx.fillRect(0,0,TILE,TILE); }
  dirty=true;
}

// ═══════════════════════════════
//  COORDINATE HELPERS
// ═══════════════════════════════
function s2w(sx,sy){ return { wx:camX+sx/zoom, wy:camY+sy/zoom }; }

// ═══════════════════════════════
//  ZOOM HELPERS
// ═══════════════════════════════
let zt=null;
function setZoom(nz,cx,cy){
  const wx=camX+cx/zoom, wy=camY+cy/zoom;
  zoom=Math.min(Math.max(nz,.06),12);
  camX=wx-cx/zoom; camY=wy-cy/zoom; dirty=true;
  const zp=document.getElementById('zoomPill');
  zp.textContent=Math.round(zoom*100)+'%'; zp.style.opacity='1';
  clearTimeout(zt); zt=setTimeout(()=>zp.style.opacity='0',1500);
}

// ═══════════════════════════════
//  PALM REJECTION
//  If touch contact radius > 28px → palm
// ═══════════════════════════════
const PALM_R = 28;
let palmTimer=null;
function isPalm(t){
  return (t.radiusX||t.webkitRadiusX||0)>PALM_R || (t.radiusY||t.webkitRadiusY||0)>PALM_R;
}
function flashPalm(){
  const p=document.getElementById('palmPill');
  p.style.opacity='1'; clearTimeout(palmTimer);
  palmTimer=setTimeout(()=>p.style.opacity='0',1100);
}

// ═══════════════════════════════
//  DRAWING STATE
// ═══════════════════════════════
let drawing=false, lastWx=0, lastWy=0;
let shapeStart=null, shapePreview=null;

function startDraw(wx,wy){
  drawing=true; lastWx=wx; lastWy=wy;
  if(tool==='line'||tool==='rect'||tool==='circle'){
    shapeStart={wx,wy}; shapePreview=null;
    beginStroke(wx,wy); return;
  }
  beginStroke(wx,wy);
  paintDot(wx,wy);
}

function moveDraw(wx,wy){
  if(!drawing) return;
  if(tool==='line'||tool==='rect'||tool==='circle'){
    shapePreview={x1:shapeStart.wx,y1:shapeStart.wy,x2:wx,y2:wy}; dirty=true; return;
  }
  addStrokeTiles(wx,wy);
  // interpolate for smooth lines at speed
  const dx=wx-lastWx, dy=wy-lastWy, dist=Math.hypot(dx,dy);
  const step=Math.max(1,size*.5);
  if(dist>step*2){
    const steps=Math.ceil(dist/step);
    for(let i=1;i<=steps;i++){
      const ix=lastWx+dx*i/steps, iy=lastWy+dy*i/steps;
      addStrokeTiles(ix,iy);
      paintSeg(lastWx+dx*(i-1)/steps, lastWy+dy*(i-1)/steps, ix, iy);
    }
  } else {
    paintSeg(lastWx,lastWy,wx,wy);
  }
  lastWx=wx; lastWy=wy;
}

function endDraw(){
  if(!drawing) return; drawing=false;
  if(tool==='line'||tool==='rect'||tool==='circle'){
    if(shapePreview){
      const r=size*2+4;
      const bx0=Math.min(shapePreview.x1,shapePreview.x2)-r, by0=Math.min(shapePreview.y1,shapePreview.y2)-r;
      const bx1=Math.max(shapePreview.x1,shapePreview.x2)+r, by1=Math.max(shapePreview.y1,shapePreview.y2)+r;
      const tx0=Math.floor(bx0/TILE),ty0=Math.floor(by0/TILE);
      const tx1=Math.floor(bx1/TILE),ty1=Math.floor(by1/TILE);
      for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++) addStrokeTiles(tx*TILE+TILE/2,ty*TILE+TILE/2);
      paintShape(shapePreview.x1,shapePreview.y1,shapePreview.x2,shapePreview.y2);
    }
    shapePreview=null; shapeStart=null;
  }
  commitStroke(); dirty=true;
}

// ═══════════════════════════════
//  MOUSE EVENTS
// ═══════════════════════════════
stage.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const{wx,wy}=s2w(e.clientX,e.clientY); startDraw(wx,wy);
});
stage.addEventListener('mousemove',e=>{
  showDot(e.clientX,e.clientY);
  const{wx,wy}=s2w(e.clientX,e.clientY); moveDraw(wx,wy);
});
stage.addEventListener('mouseup',  ()=>endDraw());
stage.addEventListener('mouseleave',()=>{ endDraw(); hideDot(); });

stage.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){ setZoom(zoom*(e.deltaY>0?.92:1.08),e.clientX,e.clientY); }
  else { camX+=e.deltaX/zoom; camY+=e.deltaY/zoom; dirty=true; }
},{passive:false});

// ═══════════════════════════════
//  TOUCH EVENTS
//  1 finger = draw (palm check)
//  2 fingers = pan + pinch zoom  (ALWAYS, even while drawing)
//  lifting to 1 finger after pinch = no accidental draw
// ═══════════════════════════════
let pinch={on:false,d0:0,z0:1,mx:0,my:0,plx:0,ply:0};
let drawTid=null;        // touch identifier currently drawing
let postPinch=false;     // cooldown: don't start drawing right after pinch ends

stage.addEventListener('touchstart',e=>{
  e.preventDefault();
  const tc=e.touches;

  if(tc.length>=2){
    // Cancel any drawing stroke
    if(drawing){ drawing=false; shapePreview=null; shapeStart=null; strokeBefore=null; dirty=true; }
    drawTid=null; postPinch=true;
    const dx=tc[0].clientX-tc[1].clientX, dy=tc[0].clientY-tc[1].clientY;
    const mx=(tc[0].clientX+tc[1].clientX)/2, my=(tc[0].clientY+tc[1].clientY)/2;
    pinch={on:true, d0:Math.hypot(dx,dy), z0:zoom, mx, my, plx:mx, ply:my };
    return;
  }

  if(tc.length===1){
    if(postPinch) return;   // ignore first finger right after pinch
    const t=tc[0];
    if(isPalm(t)){ flashPalm(); return; }
    drawTid=t.identifier;
    const{wx,wy}=s2w(t.clientX,t.clientY); startDraw(wx,wy);
  }
},{passive:false});

stage.addEventListener('touchmove',e=>{
  e.preventDefault();
  const tc=e.touches;

  if(tc.length>=2 && pinch.on){
    const dx=tc[0].clientX-tc[1].clientX, dy=tc[0].clientY-tc[1].clientY;
    const d=Math.hypot(dx,dy);
    const mx=(tc[0].clientX+tc[1].clientX)/2, my=(tc[0].clientY+tc[1].clientY)/2;

    // Pan
    camX-=(mx-pinch.plx)/zoom; camY-=(my-pinch.ply)/zoom; dirty=true;
    pinch.plx=mx; pinch.ply=my;

    // Zoom toward midpoint
    setZoom(pinch.z0*(d/pinch.d0), mx, my);
    return;
  }

  if(tc.length===1 && drawing && drawTid!==null){
    let t=null;
    for(let i=0;i<tc.length;i++) if(tc[i].identifier===drawTid){t=tc[i];break;}
    if(!t) return;
    if(isPalm(t)){ flashPalm(); endDraw(); return; }
    const{wx,wy}=s2w(t.clientX,t.clientY);
    moveDraw(wx,wy);
    showDot(t.clientX,t.clientY);
  }
},{passive:false});

stage.addEventListener('touchend',e=>{
  e.preventDefault();
  const tc=e.touches;
  if(tc.length<2) pinch.on=false;
  if(tc.length===1) postPinch=false;  // one finger remains — okay to draw NEXT touchstart
  if(tc.length===0){
    postPinch=false; drawTid=null;
    endDraw(); hideDot();
  }
},{passive:false});

stage.addEventListener('touchcancel',e=>{
  pinch.on=false; postPinch=false; drawTid=null; endDraw(); hideDot();
});

// ═══════════════════════════════
//  CURSOR DOT
// ═══════════════════════════════
const dot=document.getElementById('dot');
document.body.style.cursor='none';

function showDot(cx,cy){
  const lw=strokeLW()*zoom;
  dot.style.cssText=`left:${cx}px;top:${cy}px;width:${Math.max(lw,4)}px;height:${Math.max(lw,4)}px;`
    +`background:${tool==='eraser'?'rgba(0,0,0,.1)':color+(tool==='marker'?'44':'99')};`
    +`border:${tool==='eraser'?'1.5px solid #bbb':'none'};opacity:1;`
    +`position:fixed;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%);z-index:999;transition:width .08s,height .08s;`;
}
function hideDot(){ dot.style.opacity='0'; }

// ═══════════════════════════════
//  TOOLBAR WIRING
// ═══════════════════════════════
const tmap={pen:'tPen',marker:'tMark',eraser:'tErase',line:'tLine',rect:'tRect',circle:'tCirc'};
function setTool(t){
  tool=t;
  Object.values(tmap).forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(tmap[t]).classList.add('active');
}
document.getElementById('tPen').onclick   =()=>setTool('pen');
document.getElementById('tMark').onclick  =()=>setTool('marker');
document.getElementById('tErase').onclick =()=>setTool('eraser');
document.getElementById('tLine').onclick  =()=>setTool('line');
document.getElementById('tRect').onclick  =()=>setTool('rect');
document.getElementById('tCirc').onclick  =()=>setTool('circle');
document.getElementById('sizeSlider').oninput=e=>{size=+e.target.value;};
document.querySelectorAll('.sw').forEach(sw=>{
  sw.onclick=()=>{
    document.querySelectorAll('.sw').forEach(x=>x.classList.remove('active'));
    sw.classList.add('active'); color=sw.dataset.c;
    document.getElementById('cpick').value=color;
    if(tool==='eraser') setTool('pen');
  };
});
document.getElementById('cpick').oninput=e=>{
  color=e.target.value;
  document.querySelectorAll('.sw').forEach(x=>x.classList.remove('active'));
  if(tool==='eraser') setTool('pen');
};
document.getElementById('bUndo').onclick=undo;
document.getElementById('bRedo').onclick=redo;
document.getElementById('bClear').onclick=()=>{ if(confirm('Clear the board?')) clearAll(); };

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
  if(!e.ctrlKey){
    ({p:()=>setTool('pen'),m:()=>setTool('marker'),e:()=>setTool('eraser'),
      l:()=>setTool('line'),r:()=>setTool('rect'),c:()=>setTool('circle')}[e.key.toLowerCase()]||function(){})();
  }
  if(e.key===' '){e.preventDefault();camX=-200;camY=-150;zoom=1;dirty=true;
    const zp=document.getElementById('zoomPill'); zp.textContent='100%'; zp.style.opacity='1';
    clearTimeout(zt); zt=setTimeout(()=>zp.style.opacity='0',1500);}
});

// ═══════════════════════════════
//  PDF EXPORT
// ═══════════════════════════════
document.getElementById('pdfBtn').onclick=async()=>{
  const ov=document.getElementById('pdfOv'); ov.classList.add('show');
  await new Promise(r=>setTimeout(r,60));
  try{
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity,has=false;
    for(const k in tiles){
      const[tx,ty]=k.split(',').map(Number);
      const d=tiles[k].ctx.getImageData(0,0,TILE,TILE).data;
      for(let py=0;py<TILE;py++) for(let px=0;px<TILE;px++){
        const i=(py*TILE+px)*4;
        if(!(d[i]>245&&d[i+1]>245&&d[i+2]>245)){
          const wx=tx*TILE+px,wy=ty*TILE+py;
          if(wx<minX)minX=wx;if(wx>maxX)maxX=wx;if(wy<minY)minY=wy;if(wy>maxY)maxY=wy;has=true;
        }
      }
    }
    const P=80;
    let ex=0,ey=0,ew=2480,eh=3508;
    if(has){ex=minX-P;ey=minY-P;ew=maxX-minX+P*2;eh=maxY-minY+P*2;}
    const tmp=document.createElement('canvas'); tmp.width=ew; tmp.height=eh;
    const tc=tmp.getContext('2d'); tc.fillStyle='#fff'; tc.fillRect(0,0,ew,eh);
    for(const k in tiles){const[tx,ty]=k.split(',').map(Number); tc.drawImage(tiles[k].canvas,tx*TILE-ex,ty*TILE-ey);}
    const url=tmp.toDataURL('image/jpeg',.93);
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:ew>eh?'landscape':'portrait',unit:'px',format:[ew,eh],hotfixes:['px_scaling']});
    pdf.addImage(url,'JPEG',0,0,ew,eh);
    pdf.save('whiteboard-'+Date.now()+'.pdf');
  }catch(err){console.error(err);alert('PDF export failed.');}
  ov.classList.remove('show');
};
</script>
