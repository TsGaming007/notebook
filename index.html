<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Whiteboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ede8;
    --toolbar-bg: #1c1c1e;
    --toolbar-text: #f5f5f5;
    --accent: #ff6b35;
    --accent2: #4a9eff;
    --btn-hover: #2c2c2e;
    --btn-active: #ff6b35;
    --sep: #333;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── TOOLBAR WRAPPER (handles positioning + scroll) ── */
  #toolbarWrap {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    max-width: calc(100vw - 16px);
    z-index: 100;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
    overflow: hidden;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    height: 52px;
    background: var(--toolbar-bg);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 14px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;        /* Firefox */
    -ms-overflow-style: none;     /* IE/Edge */
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
  }
  #toolbar::-webkit-scrollbar { display: none; }  /* Chrome/Safari */

  #toolbar .logo {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 6px;
    padding-right: 10px;
    border-right: 1px solid var(--sep);
  }

  .sep { width: 1px; height: 28px; background: var(--sep); margin: 0 4px; flex-shrink: 0; }

  .tool-btn {
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.55);
    border-radius: 9px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background 0.12s, color 0.12s, transform 0.1s;
    position: relative;
    flex-shrink: 0;
  }
  .tool-btn:hover { background: var(--btn-hover); color: #fff; }
  .tool-btn.active { background: var(--accent); color: #fff; }
  .tool-btn[title]:hover::after {
    content: attr(title);
    position: absolute;
    top: 46px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 11px;
    font-family: var(--font);
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 200;
    letter-spacing: 0.02em;
  }

  /* Size slider */
  #sizeSlider {
    -webkit-appearance: none;
    width: 72px; height: 3px;
    border-radius: 2px;
    background: #444;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  #sizeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* Color swatches */
  .swatch {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.25); }
  .swatch.active { border-color: rgba(255,255,255,0.8); transform: scale(1.15); }

  #colorPicker {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid #555;
    cursor: pointer;
    padding: 0;
    background: none;
    overflow: hidden;
    flex-shrink: 0;
  }
  #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
  #colorPicker::-webkit-color-swatch { border: none; border-radius: 50%; }

  /* Download PDF button */
  #downloadBtn {
    margin-left: 4px;
    padding: 0 14px;
    height: 34px;
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 9px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #downloadBtn:hover { opacity: 0.88; transform: translateY(-1px); }
  #downloadBtn:active { transform: translateY(0); opacity: 1; }

  /* ── CANVAS AREA ── */
  #canvasWrap {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: auto;
    cursor: crosshair;
  }

  #drawCanvas {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
    touch-action: none;
    transform-origin: 0 0;
    background: #ffffff;
  }

  /* Grid overlay (subtle dots) */
  #gridCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
    transform-origin: 0 0;
  }

  /* ── BOTTOM HUD ── */
  #hud {
    position: fixed;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    z-index: 200;
  }

  #modeToggle {
    background: rgba(28,28,30,0.9);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 30px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    backdrop-filter: blur(8px);
    letter-spacing: 0.02em;
  }
  #modeToggle.pan-mode {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  #zoomIndicator {
    background: rgba(28,28,30,0.85);
    color: rgba(255,255,255,0.6);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: 30px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* Cursor dot */
  #cursorDot {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%,-50%);
    z-index: 999;
    transition: width 0.08s, height 0.08s, background 0.1s, opacity 0.1s;
    opacity: 0;
    mix-blend-mode: multiply;
  }

  /* PDF progress overlay */
  #pdfOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(4px);
  }
  #pdfOverlay.show { display: flex; }
  #pdfOverlay .msg {
    color: #fff;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  #pdfOverlay .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbarWrap">
<div id="toolbar">
  <span class="logo">Board</span>

  <button class="tool-btn active" id="toolPen" title="Pen (P)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tool-btn" id="toolMarker" title="Marker (M)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
  </button>
  <button class="tool-btn" id="toolEraser" title="Eraser (E)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
  </button>
  <button class="tool-btn" id="toolLine" title="Line (L)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
  </button>
  <button class="tool-btn" id="toolRect" title="Rectangle (R)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
  </button>
  <button class="tool-btn" id="toolCircle" title="Circle (C)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
  </button>

  <div class="sep"></div>

  <svg width="10" height="10" viewBox="0 0 10 10" style="color:rgba(255,255,255,0.3);flex-shrink:0"><circle cx="5" cy="5" r="2" fill="currentColor"/></svg>
  <input type="range" id="sizeSlider" min="1" max="40" value="3">
  <svg width="12" height="12" viewBox="0 0 12 12" style="color:rgba(255,255,255,0.3);flex-shrink:0"><circle cx="6" cy="6" r="5.5" fill="currentColor"/></svg>

  <div class="sep"></div>

  <div class="swatch active" style="background:#111111" data-color="#111111"></div>
  <div class="swatch" style="background:#e63946" data-color="#e63946"></div>
  <div class="swatch" style="background:#2196f3" data-color="#2196f3"></div>
  <div class="swatch" style="background:#2ecc71" data-color="#2ecc71"></div>
  <div class="swatch" style="background:#ff9800" data-color="#ff9800"></div>
  <div class="swatch" style="background:#9c27b0" data-color="#9c27b0"></div>
  <input type="color" id="colorPicker" value="#111111" title="Custom color">

  <div class="sep"></div>

  <button class="tool-btn" id="btnUndo" title="Undo (Ctrl+Z)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
  </button>
  <button class="tool-btn" id="btnRedo" title="Redo (Ctrl+Y)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
  </button>
  <button class="tool-btn" id="btnClear" title="Clear board">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
  </button>

  <div class="sep"></div>

  <button id="downloadBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export PDF
  </button>
</div>
</div>

<!-- CANVAS WRAP -->
<div id="canvasWrap">
  <canvas id="gridCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
</div>

<!-- BOTTOM HUD -->
<div id="hud">
  <button id="modeToggle">✏️ Draw</button>
  <div id="zoomIndicator">100%</div>
</div>

<div id="cursorDot"></div>

<!-- PDF OVERLAY -->
<div id="pdfOverlay">
  <div class="spinner"></div>
  <div class="msg">Generating PDF…</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const GRID_SIZE   = 40;    // dot grid spacing
const INITIAL_W   = 4000;  // starting canvas width
const INITIAL_H   = 3000;  // starting canvas height
const EXPAND_PX   = 800;   // expand when this close to edge
const EXPAND_AMT  = 1500;  // how much to expand

// ── STATE ───────────────────────────────────────────────────
let tool      = 'pen';
let color     = '#111111';
let size      = 3;
let drawing   = false;
let lastX = 0, lastY = 0;
let shapeStart = null;
let shapePreviewData = null;
let scale     = 1;
let isPanMode = false;
let panTracking = false;
let panLastX = 0, panLastY = 0;
let panOffX = 0, panOffY = 0;  // scroll offset
let pinchStartDist = 0, pinchStartScale = 1, pinchMidX = 0, pinchMidY = 0;
let undoStack = [], redoStack = [];
let canvasW = INITIAL_W, canvasH = INITIAL_H;
let zoomTimer = null;

// ── ELEMENTS ────────────────────────────────────────────────
const wrap       = document.getElementById('canvasWrap');
const gridCanvas = document.getElementById('gridCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const gCtx       = gridCanvas.getContext('2d');
const ctx        = drawCanvas.getContext('2d');
const cursorDot  = document.getElementById('cursorDot');
const zoomInd    = document.getElementById('zoomIndicator');
const modeToggle = document.getElementById('modeToggle');
const pdfOverlay = document.getElementById('pdfOverlay');

// ── INIT ────────────────────────────────────────────────────
function init() {
  setCanvasSize(canvasW, canvasH);
  // fill white
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasW, canvasH);
  saveUndo();
}

function setCanvasSize(w, h) {
  canvasW = w; canvasH = h;
  const imgData = ctx ? ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height) : null;

  drawCanvas.width  = w; drawCanvas.height = h;
  gridCanvas.width  = w; gridCanvas.height = h;

  drawCanvas.style.transformOrigin = '0 0';
  gridCanvas.style.transformOrigin = '0 0';

  // Restore drawing content
  if (imgData) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.putImageData(imgData, 0, 0);
  }

  drawGrid();
  applyTransform();
}

function drawGrid() {
  gCtx.clearRect(0, 0, canvasW, canvasH);
  gCtx.fillStyle = '#e8e4df';
  for (let x = 0; x <= canvasW; x += GRID_SIZE) {
    for (let y = 0; y <= canvasH; y += GRID_SIZE) {
      gCtx.beginPath();
      gCtx.arc(x, y, 1.2, 0, Math.PI * 2);
      gCtx.fill();
    }
  }
}

function applyTransform() {
  drawCanvas.style.transform = `scale(${scale})`;
  gridCanvas.style.transform = `scale(${scale})`;
  wrap.style.width  = window.innerWidth + 'px';
  wrap.style.height = window.innerHeight + 'px';
  // Update scroll container size
  const scaledW = canvasW * scale;
  const scaledH = canvasH * scale;
  drawCanvas.style.marginLeft = '0';
  drawCanvas.style.marginTop  = '0';
}

// ── ZOOM ────────────────────────────────────────────────────
function clampScale(s) { return Math.min(Math.max(s, 0.1), 8); }
function showZoom() {
  zoomInd.textContent = Math.round(scale * 100) + '%';
  zoomInd.style.opacity = '1';
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(() => zoomInd.style.opacity = '0', 1500);
}

// ── COORDINATE MAPPING ──────────────────────────────────────
function clientToCanvas(cx, cy) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: (cx - rect.left) / scale,
    y: (cy - rect.top)  / scale
  };
}
function getMousePos(e) { return clientToCanvas(e.clientX, e.clientY); }
function getTouchPos(e) {
  const t = e.touches[0];
  return clientToCanvas(t.clientX, t.clientY);
}
function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

// ── TOOL APPLICATION ────────────────────────────────────────
function applyTool() {
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = '#ffffff';
    ctx.fillStyle   = '#ffffff';
    ctx.lineWidth   = size * 5;
    ctx.globalAlpha = 1;
  } else if (tool === 'marker') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.fillStyle   = color;
    ctx.lineWidth   = size * 4;
    ctx.globalAlpha = 0.3;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.fillStyle   = color;
    ctx.lineWidth   = (tool === 'pen') ? size : size * 1.5;
    ctx.globalAlpha = 1;
  }
}

// ── UNDO / REDO ─────────────────────────────────────────────
function saveUndo() {
  undoStack.push(ctx.getImageData(0, 0, canvasW, canvasH));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function undo() {
  if (undoStack.length < 2) return;
  redoStack.push(undoStack.pop());
  ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
}
function redo() {
  if (!redoStack.length) return;
  const s = redoStack.pop();
  undoStack.push(s);
  ctx.putImageData(s, 0, 0);
}

// ── INFINITE EXPANSION ──────────────────────────────────────
function checkExpand() {
  const rect = drawCanvas.getBoundingClientRect();
  const wRight  = wrap.scrollLeft + wrap.clientWidth;
  const wBottom = wrap.scrollTop  + wrap.clientHeight;
  const scaledW = canvasW * scale;
  const scaledH = canvasH * scale;
  let newW = canvasW, newH = canvasH;
  if (wRight  > scaledW - EXPAND_PX * scale) newW = canvasW + EXPAND_AMT;
  if (wBottom > scaledH - EXPAND_PX * scale) newH = canvasH + EXPAND_AMT;
  if (newW !== canvasW || newH !== canvasH) {
    const old = ctx.getImageData(0, 0, canvasW, canvasH);
    setCanvasSize(newW, newH);
    ctx.putImageData(old, 0, 0);
  }
}
wrap.addEventListener('scroll', checkExpand);

// ── MOUSE EVENTS ────────────────────────────────────────────
let linePreviewData = null;

drawCanvas.addEventListener('mousedown', (e) => {
  if (isPanMode) {
    panTracking = true;
    panLastX = e.clientX; panLastY = e.clientY;
    wrap.style.cursor = 'grabbing';
    return;
  }
  const {x, y} = getMousePos(e);
  drawing = true; lastX = x; lastY = y;
  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    shapeStart = {x, y};
    saveUndo();
    return;
  }
  applyTool();
  ctx.beginPath();
  ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y);
});

drawCanvas.addEventListener('mousemove', (e) => {
  updateCursorDot(e);
  if (isPanMode && panTracking) {
    const dx = e.clientX - panLastX;
    const dy = e.clientY - panLastY;
    panLastX = e.clientX; panLastY = e.clientY;
    wrap.scrollLeft -= dx;
    wrap.scrollTop  -= dy;
    return;
  }
  if (!drawing) return;
  const {x, y} = getMousePos(e);

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    if (shapePreviewData) ctx.putImageData(shapePreviewData, 0, 0);
    else shapePreviewData = ctx.getImageData(0, 0, canvasW, canvasH);
    applyTool();
    drawShape(shapeStart.x, shapeStart.y, x, y);
    return;
  }

  applyTool();
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  lastX = x; lastY = y;
});

drawCanvas.addEventListener('mouseup',    endDrawMouse);
drawCanvas.addEventListener('mouseleave', endDrawMouse);
function endDrawMouse(e) {
  if (isPanMode) { panTracking = false; wrap.style.cursor = 'grab'; return; }
  if (!drawing) return;
  drawing = false;
  shapePreviewData = null; shapeStart = null;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  saveUndo();
  checkExpand();
}

// Wheel zoom
wrap.addEventListener('wheel', (e) => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = clampScale(scale * delta);
  const canvasX = (e.clientX + wrap.scrollLeft) / scale;
  const canvasY = (e.clientY + wrap.scrollTop)  / scale;
  scale = newScale;
  applyTransform();
  wrap.scrollLeft = canvasX * scale - e.clientX;
  wrap.scrollTop  = canvasY * scale - e.clientY;
  showZoom();
}, {passive: false});

// ── TOUCH EVENTS ────────────────────────────────────────────
drawCanvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    drawing = false;
    pinchStartDist  = getTouchDist(e);
    pinchStartScale = scale;
    const mid = getTouchMid(e);
    pinchMidX = mid.x; pinchMidY = mid.y;
    return;
  }
  if (isPanMode) {
    panTracking = true;
    panLastX = e.touches[0].clientX; panLastY = e.touches[0].clientY;
    return;
  }
  const {x, y} = getTouchPos(e);
  drawing = true; lastX = x; lastY = y;
  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    shapeStart = {x, y}; saveUndo(); return;
  }
  applyTool();
  ctx.beginPath();
  ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y);
}, {passive: false});

drawCanvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    const mid  = getTouchMid(e);
    const newScale = clampScale(pinchStartScale * (dist / pinchStartDist));
    const canvasX = (mid.x + wrap.scrollLeft) / scale;
    const canvasY = (mid.y + wrap.scrollTop)  / scale;
    scale = newScale;
    applyTransform();
    wrap.scrollLeft = canvasX * scale - mid.x;
    wrap.scrollTop  = canvasY * scale - mid.y;
    showZoom(); return;
  }
  if (isPanMode && panTracking) {
    const dx = e.touches[0].clientX - panLastX;
    const dy = e.touches[0].clientY - panLastY;
    panLastX = e.touches[0].clientX; panLastY = e.touches[0].clientY;
    wrap.scrollLeft -= dx;
    wrap.scrollTop  -= dy;
    return;
  }
  if (!drawing) return;
  const {x, y} = getTouchPos(e);
  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    if (shapePreviewData) ctx.putImageData(shapePreviewData, 0, 0);
    else shapePreviewData = ctx.getImageData(0, 0, canvasW, canvasH);
    applyTool();
    drawShape(shapeStart.x, shapeStart.y, x, y);
    return;
  }
  applyTool();
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  lastX = x; lastY = y;
}, {passive: false});

drawCanvas.addEventListener('touchend', (e) => {
  panTracking = false;
  if (!drawing) return;
  drawing = false;
  shapePreviewData = null; shapeStart = null;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  saveUndo();
  checkExpand();
});

// ── SHAPE DRAWING ───────────────────────────────────────────
function drawShape(x1, y1, x2, y2) {
  ctx.beginPath();
  if (tool === 'line') {
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  } else if (tool === 'rect') {
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  } else if (tool === 'circle') {
    const rx = (x2 - x1) / 2, ry = (y2 - y1) / 2;
    ctx.ellipse(x1 + rx, y1 + ry, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ── CURSOR DOT ──────────────────────────────────────────────
function updateCursorDot(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const s  = (tool === 'eraser' ? size * 5 : tool === 'marker' ? size * 4 : size) * scale;
  cursorDot.style.left   = cx + 'px';
  cursorDot.style.top    = cy + 'px';
  cursorDot.style.width  = Math.max(s, 4) + 'px';
  cursorDot.style.height = Math.max(s, 4) + 'px';
  cursorDot.style.background = tool === 'eraser'
    ? 'rgba(0,0,0,0.15)'
    : (tool === 'marker' ? color + '55' : color + 'bb');
  cursorDot.style.border = tool === 'eraser' ? '1.5px solid #aaa' : 'none';
  cursorDot.style.opacity = isPanMode ? '0' : '0.9';
}
drawCanvas.addEventListener('mousemove', updateCursorDot);
drawCanvas.addEventListener('mouseleave', () => cursorDot.style.opacity = '0');
drawCanvas.addEventListener('mouseenter', (e) => { updateCursorDot(e); });
document.body.style.cursor = 'none';

// ── TOOLBAR INTERACTIONS ─────────────────────────────────────
function setTool(t) {
  tool = t;
  ['toolPen','toolMarker','toolEraser','toolLine','toolRect','toolCircle'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const map = {pen:'toolPen', marker:'toolMarker', eraser:'toolEraser',
               line:'toolLine', rect:'toolRect', circle:'toolCircle'};
  document.getElementById(map[t]).classList.add('active');
}

document.getElementById('toolPen').onclick    = () => setTool('pen');
document.getElementById('toolMarker').onclick = () => setTool('marker');
document.getElementById('toolEraser').onclick = () => setTool('eraser');
document.getElementById('toolLine').onclick   = () => setTool('line');
document.getElementById('toolRect').onclick   = () => setTool('rect');
document.getElementById('toolCircle').onclick = () => setTool('circle');

document.getElementById('sizeSlider').oninput = e => { size = +e.target.value; };

document.querySelectorAll('.swatch').forEach(sw => {
  sw.onclick = () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    sw.classList.add('active');
    color = sw.dataset.color;
    document.getElementById('colorPicker').value = color;
    if (tool === 'eraser') setTool('pen');
  };
});
document.getElementById('colorPicker').oninput = e => {
  color = e.target.value;
  document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
  if (tool === 'eraser') setTool('pen');
};

document.getElementById('btnUndo').onclick  = undo;
document.getElementById('btnRedo').onclick  = redo;
document.getElementById('btnClear').onclick = () => {
  if (!confirm('Clear the entire board?')) return;
  saveUndo();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasW, canvasH);
  saveUndo();
};

// ── MODE TOGGLE ─────────────────────────────────────────────
modeToggle.addEventListener('click', () => {
  isPanMode = !isPanMode;
  modeToggle.innerHTML = isPanMode ? '🤚 Pan / Zoom' : '✏️ Draw';
  modeToggle.classList.toggle('pan-mode', isPanMode);
  wrap.style.cursor = isPanMode ? 'grab' : 'crosshair';
  document.body.style.cursor = isPanMode ? 'default' : 'none';
  cursorDot.style.opacity = '0';
});

// ── KEYBOARD SHORTCUTS ───────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (!e.ctrlKey) {
    if (e.key === 'p' || e.key === 'P') setTool('pen');
    if (e.key === 'm' || e.key === 'M') setTool('marker');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'l' || e.key === 'L') setTool('line');
    if (e.key === 'r' || e.key === 'R') setTool('rect');
    if (e.key === 'c' || e.key === 'C') setTool('circle');
  }
});

// ── PDF EXPORT ───────────────────────────────────────────────
document.getElementById('downloadBtn').onclick = async () => {
  pdfOverlay.classList.add('show');
  await new Promise(r => setTimeout(r, 50)); // let overlay render

  try {
    // Find the bounding box of drawn content
    const imgData = ctx.getImageData(0, 0, canvasW, canvasH);
    const data = imgData.data;
    let minX = canvasW, minY = canvasH, maxX = 0, maxY = 0;
    let hasContent = false;

    for (let y = 0; y < canvasH; y++) {
      for (let x = 0; x < canvasW; x++) {
        const idx = (y * canvasW + x) * 4;
        const r = data[idx], g = data[idx+1], b = data[idx+2];
        // Not white and not transparent
        if (!(r > 245 && g > 245 && b > 245)) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
          hasContent = true;
        }
      }
    }

    let exportW, exportH, offsetX, offsetY;
    const PAD = 60;

    if (!hasContent) {
      // Export a blank A4
      exportW = 2480; exportH = 3508;
      offsetX = 0; offsetY = 0;
    } else {
      offsetX = Math.max(0, minX - PAD);
      offsetY = Math.max(0, minY - PAD);
      exportW = Math.min(canvasW - offsetX, maxX - offsetX + PAD * 2);
      exportH = Math.min(canvasH - offsetY, maxY - offsetY + PAD * 2);
    }

    // Create export canvas (white background)
    const tmp = document.createElement('canvas');
    tmp.width  = exportW;
    tmp.height = exportH;
    const tCtx = tmp.getContext('2d');
    tCtx.fillStyle = '#ffffff';
    tCtx.fillRect(0, 0, exportW, exportH);
    tCtx.drawImage(drawCanvas, -offsetX, -offsetY);

    const imgURL = tmp.toDataURL('image/jpeg', 0.92);

    // Use jsPDF
    const { jsPDF } = window.jspdf;

    // Determine orientation
    const isLandscape = exportW > exportH;
    const pdf = new jsPDF({
      orientation: isLandscape ? 'landscape' : 'portrait',
      unit: 'px',
      format: [exportW, exportH],
      hotfixes: ['px_scaling']
    });

    pdf.addImage(imgURL, 'JPEG', 0, 0, exportW, exportH);
    pdf.save('whiteboard-' + Date.now() + '.pdf');

  } catch(err) {
    console.error('PDF error:', err);
    alert('PDF export failed. Try downloading as PNG instead.');
  }

  pdfOverlay.classList.remove('show');
};

// ── RESIZE ───────────────────────────────────────────────────
window.addEventListener('resize', () => {
  applyTransform();
});

// ── START ────────────────────────────────────────────────────
init();
</script>
</body>
</html>
