<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiteboard Notes</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #edeae5;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 10px 30px oklch(0.2 0.01 80 / 0.10);
      --shadow-lg: 0 18px 44px oklch(0.2 0.01 80 / 0.14);
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --note-yellow: #fff0a8;
      --note-pink: #ffd1df;
      --note-blue: #cfe8ff;
      --note-green: #d5f3d2;
      --note-lilac: #e7dbff;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #22211f;
      --color-border: #393836;
      --color-divider: #262523;
      --color-text: #e2e0dc;
      --color-text-muted: #9d9b97;
      --color-text-inverse: #171614;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #313b3b;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 10px 30px oklch(0 0 0 / 0.35);
      --shadow-lg: 0 18px 44px oklch(0 0 0 / 0.45);
      --note-yellow: #8d7b28;
      --note-pink: #8a4960;
      --note-blue: #365a84;
      --note-green: #3c6d3b;
      --note-lilac: #665189;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    html {
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-text);
      background: radial-gradient(circle at top left, color-mix(in oklab, var(--color-primary) 6%, var(--color-bg)), var(--color-bg) 32%);
    }
    button, input, textarea { font: inherit; color: inherit; }
    button {
      border: 0;
      background: none;
      cursor: pointer;
      transition: transform var(--transition-interactive), background var(--transition-interactive), color var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: color-mix(in oklab, var(--color-surface) 88%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-right: auto;
      min-width: 11rem;
    }
    .brand-logo {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--color-primary-highlight), color-mix(in oklab, var(--color-primary) 25%, var(--color-surface-2)));
      color: var(--color-primary);
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--color-primary) 18%, transparent);
      flex: 0 0 auto;
    }
    .brand-text strong {
      display: block;
      font-size: var(--text-sm);
      line-height: 1.1;
    }
    .brand-text span {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
    }
    .group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      background: var(--color-surface-2);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .tool-btn, .action-btn, .theme-btn {
      min-width: 2.75rem;
      min-height: 2.75rem;
      padding: 0 var(--space-3);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-text);
      white-space: nowrap;
    }
    .tool-btn.active,
    .action-btn.primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }
    .action-btn,
    .theme-btn {
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      background: var(--color-surface);
    }

    .swatch {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 2px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }
    .swatch.active,
    .note-swatch.active { outline: 2px solid var(--color-primary); outline-offset: 2px; }

    .note-swatch {
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-md);
      border: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding-inline: var(--space-2);
    }
    .range-wrap span {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    input[type="range"] {
      accent-color: var(--color-primary);
      width: 8rem;
    }

    .stage {
      position: relative;
      overflow: hidden;
      padding: clamp(var(--space-3), 1vw, var(--space-4));
    }
    .canvas-shell {
      position: relative;
      height: 100%;
      min-height: 18rem;
      border-radius: calc(var(--radius-lg) + var(--space-1));
      background:
        linear-gradient(var(--color-divider) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-divider) 1px, transparent 1px),
        var(--color-surface);
      background-size: 24px 24px, 24px 24px, auto;
      border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
      z-index: 1;
    }

    .notes-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .note {
      position: absolute;
      width: 240px;
      min-height: 160px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      overflow: hidden;
      pointer-events: auto;
      user-select: none;
    }
    .note.selected {
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--color-primary) 45%, transparent), var(--shadow-lg);
    }
    .note-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: color-mix(in oklab, #000 4%, transparent);
      cursor: grab;
      touch-action: none;
    }
    .note-header:active { cursor: grabbing; }
    .note-title {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      opacity: 0.72;
    }
    .note-delete {
      min-width: 1.9rem;
      min-height: 1.9rem;
      border-radius: var(--radius-full);
      color: inherit;
    }
    .note-delete:hover { background: color-mix(in oklab, var(--color-text) 10%, transparent); }
    .note-body {
      width: 100%;
      height: 100%;
      min-height: 110px;
      padding: var(--space-3);
      border: 0;
      resize: none;
      background: transparent;
      color: inherit;
      outline: none;
      line-height: 1.45;
    }
    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      color: color-mix(in oklab, currentColor 70%, black 20%);
      background: color-mix(in oklab, #fff 8%, transparent);
    }
    .resize-handle {
      width: 1rem;
      height: 1rem;
      border-radius: var(--radius-sm);
      background: color-mix(in oklab, currentColor 18%, transparent);
      cursor: nwse-resize;
      touch-action: none;
    }

    .status {
      position: absolute;
      right: var(--space-4);
      bottom: var(--space-4);
      display: flex;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-2) var(--space-3);
      background: color-mix(in oklab, var(--color-surface-2) 92%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(10px);
      z-index: 3;
      pointer-events: none;
    }
    .kbd {
      padding: 0.1rem 0.45rem;
      border-radius: var(--radius-sm);
      background: var(--color-surface-offset);
      color: var(--color-text);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .brand { width: 100%; margin-right: 0; }
      .controls { width: 100%; }
      .group { width: 100%; justify-content: flex-start; overflow-x: auto; }
      .status { left: var(--space-4); right: auto; max-width: calc(100% - 2rem); }
      .note { width: min(78vw, 240px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="brand" aria-label="Whiteboard notes app name">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Whiteboard notes logo">
            <rect x="3.5" y="4" width="17" height="12.5" rx="2.5"></rect>
            <path d="M7 20h10"></path>
            <path d="M12 16.5V20"></path>
            <path d="M8 8.5h8"></path>
            <path d="M8 11.5h5"></path>
          </svg>
        </div>
        <div class="brand-text">
          <strong>Whiteboard Notes</strong>
          <span>Draw and place editable sticky notes.</span>
        </div>
      </div>

      <div class="controls" aria-label="Whiteboard notes controls">
        <div class="group" role="toolbar" aria-label="Tools">
          <button class="tool-btn active" data-tool="pen" aria-pressed="true" title="Pen (P)">Pen</button>
          <button class="tool-btn" data-tool="eraser" aria-pressed="false" title="Eraser (E)">Erase</button>
          <button class="tool-btn" data-tool="note" aria-pressed="false" title="New note (N)">Note</button>
        </div>

        <div class="group" role="toolbar" aria-label="Pen colors">
          <button class="swatch active" data-color="#111111" style="background:#111111" aria-label="Black pen color"></button>
          <button class="swatch" data-color="#01696f" style="background:#01696f" aria-label="Teal pen color"></button>
          <button class="swatch" data-color="#006494" style="background:#006494" aria-label="Blue pen color"></button>
          <button class="swatch" data-color="#964219" style="background:#964219" aria-label="Brown pen color"></button>
          <button class="swatch" data-color="#a13544" style="background:#a13544" aria-label="Red pen color"></button>
          <button class="swatch" data-color="#437a22" style="background:#437a22" aria-label="Green pen color"></button>
        </div>

        <div class="group" role="toolbar" aria-label="Note colors">
          <button class="note-swatch active" data-note-color="var(--note-yellow)" style="background:var(--note-yellow)" aria-label="Yellow note"></button>
          <button class="note-swatch" data-note-color="var(--note-pink)" style="background:var(--note-pink)" aria-label="Pink note"></button>
          <button class="note-swatch" data-note-color="var(--note-blue)" style="background:var(--note-blue)" aria-label="Blue note"></button>
          <button class="note-swatch" data-note-color="var(--note-green)" style="background:var(--note-green)" aria-label="Green note"></button>
          <button class="note-swatch" data-note-color="var(--note-lilac)" style="background:var(--note-lilac)" aria-label="Lilac note"></button>
        </div>

        <div class="group" aria-label="Brush size">
          <label class="range-wrap">
            <span>Size</span>
            <input id="sizeRange" type="range" min="2" max="32" value="4" />
            <span id="sizeValue">4 px</span>
          </label>
        </div>

        <div class="group" role="toolbar" aria-label="Actions">
          <button class="action-btn" id="undoBtn" title="Undo (Ctrl/Cmd+Z)">Undo</button>
          <button class="action-btn" id="clearDrawBtn" title="Clear drawing only">Clear ink</button>
          <button class="action-btn" id="clearNotesBtn" title="Remove all notes">Clear notes</button>
          <button class="action-btn primary" id="downloadBtn" title="Download PNG">Download</button>
          <button class="theme-btn" id="themeToggle" data-theme-toggle aria-label="Switch theme" title="Toggle theme"></button>
        </div>
      </div>
    </header>

    <main class="stage">
      <h1 class="sr-only">Whiteboard with notes</h1>
      <div class="canvas-shell" id="boardShell">
        <canvas id="board"></canvas>
        <div class="notes-layer" id="notesLayer"></div>
        <div class="status">
          <span id="statusText">Pen ready</span>
          <span class="kbd">P</span>
          <span class="kbd">E</span>
          <span class="kbd">N</span>
          <span class="kbd">Ctrl+Z</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    (() => {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const paintThemeIcon = () => {
        toggle.innerHTML = theme === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        toggle.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
      };
      html.setAttribute('data-theme', theme);
      paintThemeIcon();
      toggle.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', theme);
        paintThemeIcon();
      });

      const shell = document.getElementById('boardShell');
      const notesLayer = document.getElementById('notesLayer');
      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');
      const sizeRange = document.getElementById('sizeRange');
      const sizeValue = document.getElementById('sizeValue');
      const statusText = document.getElementById('statusText');
      const undoBtn = document.getElementById('undoBtn');
      const clearDrawBtn = document.getElementById('clearDrawBtn');
      const clearNotesBtn = document.getElementById('clearNotesBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const toolButtons = [...document.querySelectorAll('[data-tool]')];
      const swatches = [...document.querySelectorAll('[data-color]')];
      const noteSwatches = [...document.querySelectorAll('[data-note-color]')];

      let currentTool = 'pen';
      let currentColor = '#111111';
      let currentNoteColor = 'var(--note-yellow)';
      let currentSize = Number(sizeRange.value);
      let drawing = false;
      let history = [];
      let pointerId = null;
      let noteCounter = 0;
      let selectedNote = null;
      let dragState = null;

      const setStatus = () => {
        if (currentTool === 'eraser') {
          statusText.textContent = `Eraser · ${currentSize}px`;
        } else if (currentTool === 'note') {
          statusText.textContent = 'Note mode · tap the board to add a sticky note';
        } else {
          statusText.textContent = `Pen · ${currentSize}px · ${currentColor.toUpperCase()}`;
        }
      };

      const fillWhiteBackground = () => {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      };

      const resizeCanvas = () => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = shell.getBoundingClientRect();
        const snapshot = canvas.width ? canvas.toDataURL('image/png') : null;
        canvas.width = Math.floor(rect.width * ratio);
        canvas.height = Math.floor(rect.height * ratio);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (snapshot) {
          const img = new Image();
          img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
          img.src = snapshot;
        } else {
          fillWhiteBackground();
          saveState();
        }
      };

      const saveState = () => {
        history.push(canvas.toDataURL('image/png'));
        if (history.length > 40) history.shift();
        undoBtn.disabled = history.length <= 1;
      };

      const restoreState = (dataUrl) => {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        img.src = dataUrl;
      };

      const getPoint = (event) => {
        const rect = canvas.getBoundingClientRect();
        return { x: event.clientX - rect.left, y: event.clientY - rect.top };
      };

      const beginStroke = (event) => {
        if (currentTool === 'note') return;
        if (pointerId !== null && event.pointerId !== pointerId) return;
        pointerId = event.pointerId;
        drawing = true;
        const { x, y } = getPoint(event);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineWidth = currentSize;
        ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;
        canvas.setPointerCapture(pointerId);
      };

      const drawStroke = (event) => {
        if (!drawing || event.pointerId !== pointerId) return;
        const { x, y } = getPoint(event);
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const endStroke = (event) => {
        if (!drawing || event.pointerId !== pointerId) return;
        drawing = false;
        ctx.closePath();
        saveState();
        canvas.releasePointerCapture(pointerId);
        pointerId = null;
      };

      const setTool = (tool) => {
        currentTool = tool;
        toolButtons.forEach((btn) => {
          const active = btn.dataset.tool === tool;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-pressed', String(active));
        });
        canvas.style.cursor = tool === 'note' ? 'copy' : 'crosshair';
        setStatus();
      };

      const setColor = (color) => {
        currentColor = color;
        swatches.forEach((btn) => btn.classList.toggle('active', btn.dataset.color === color));
        if (currentTool !== 'pen') setTool('pen');
        setStatus();
      };

      const setNoteColor = (color) => {
        currentNoteColor = color;
        noteSwatches.forEach((btn) => btn.classList.toggle('active', btn.dataset.noteColor === color));
      };

      const clearSelection = () => {
        if (selectedNote) selectedNote.classList.remove('selected');
        selectedNote = null;
      };

      const selectNote = (note) => {
        clearSelection();
        selectedNote = note;
        note.classList.add('selected');
      };

      const createNote = (x, y) => {
        noteCounter += 1;
        const note = document.createElement('article');
        note.className = 'note';
        note.style.left = `${Math.max(8, x - 100)}px`;
        note.style.top = `${Math.max(8, y - 40)}px`;
        note.style.background = `color-mix(in oklab, ${currentNoteColor} 92%, white 8%)`;
        note.style.color = '#2a2418';
        note.dataset.id = String(noteCounter);
        note.innerHTML = `
          <div class="note-header">
            <span class="note-title">Note ${noteCounter}</span>
            <button class="note-delete" type="button" aria-label="Delete note">✕</button>
          </div>
          <textarea class="note-body" placeholder="Write your note..."></textarea>
          <div class="note-footer">
            <span>Drag or resize</span>
            <div class="resize-handle" aria-hidden="true"></div>
          </div>
        `;
        notesLayer.appendChild(note);
        selectNote(note);

        const textarea = note.querySelector('.note-body');
        textarea.addEventListener('pointerdown', (event) => event.stopPropagation());
        textarea.addEventListener('focus', () => selectNote(note));

        note.querySelector('.note-delete').addEventListener('click', (event) => {
          event.stopPropagation();
          if (selectedNote === note) clearSelection();
          note.remove();
        });

        note.addEventListener('pointerdown', (event) => {
          if (event.target.closest('.resize-handle') || event.target.closest('.note-delete') || event.target.closest('.note-body')) return;
          selectNote(note);
          const rect = note.getBoundingClientRect();
          const shellRect = shell.getBoundingClientRect();
          dragState = {
            type: 'move',
            note,
            pointerId: event.pointerId,
            offsetX: event.clientX - rect.left,
            offsetY: event.clientY - rect.top,
            shellRect
          };
          note.setPointerCapture(event.pointerId);
        });

        note.querySelector('.resize-handle').addEventListener('pointerdown', (event) => {
          event.stopPropagation();
          selectNote(note);
          dragState = {
            type: 'resize',
            note,
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            startWidth: note.offsetWidth,
            startHeight: note.offsetHeight
          };
          note.setPointerCapture(event.pointerId);
        });

        textarea.focus();
      };

      const moveNote = (event) => {
        if (!dragState || event.pointerId !== dragState.pointerId) return;
        if (dragState.type === 'move') {
          const { note, offsetX, offsetY, shellRect } = dragState;
          const nextLeft = Math.min(shellRect.width - note.offsetWidth - 8, Math.max(8, event.clientX - shellRect.left - offsetX));
          const nextTop = Math.min(shellRect.height - note.offsetHeight - 8, Math.max(8, event.clientY - shellRect.top - offsetY));
          note.style.left = `${nextLeft}px`;
          note.style.top = `${nextTop}px`;
        } else if (dragState.type === 'resize') {
          const { note, startX, startY, startWidth, startHeight } = dragState;
          note.style.width = `${Math.max(180, startWidth + (event.clientX - startX))}px`;
          note.style.height = `${Math.max(140, startHeight + (event.clientY - startY))}px`;
        }
      };

      const endMoveNote = (event) => {
        if (!dragState || event.pointerId !== dragState.pointerId) return;
        dragState.note.releasePointerCapture(event.pointerId);
        dragState = null;
      };

      toolButtons.forEach((btn) => btn.addEventListener('click', () => setTool(btn.dataset.tool)));
      swatches.forEach((btn) => btn.addEventListener('click', () => setColor(btn.dataset.color)));
      noteSwatches.forEach((btn) => btn.addEventListener('click', () => setNoteColor(btn.dataset.noteColor)));

      sizeRange.addEventListener('input', () => {
        currentSize = Number(sizeRange.value);
        sizeValue.textContent = `${currentSize} px`;
        setStatus();
      });

      undoBtn.addEventListener('click', () => {
        if (history.length <= 1) return;
        history.pop();
        restoreState(history[history.length - 1]);
        undoBtn.disabled = history.length <= 1;
      });

      clearDrawBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fillWhiteBackground();
        saveState();
      });

      clearNotesBtn.addEventListener('click', () => {
        notesLayer.innerHTML = '';
        clearSelection();
      });

      downloadBtn.addEventListener('click', async () => {
        const exportCanvas = document.createElement('canvas');
        const rect = shell.getBoundingClientRect();
        exportCanvas.width = rect.width;
        exportCanvas.height = rect.height;
        const exportCtx = exportCanvas.getContext('2d');
        exportCtx.fillStyle = '#ffffff';
        exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
        exportCtx.drawImage(canvas, 0, 0, rect.width, rect.height);

        for (const note of [...notesLayer.querySelectorAll('.note')]) {
          const left = parseFloat(note.style.left || '0');
          const top = parseFloat(note.style.top || '0');
          const width = note.offsetWidth;
          const height = note.offsetHeight;
          const bg = getComputedStyle(note).backgroundColor;
          exportCtx.fillStyle = bg;
          exportCtx.strokeStyle = 'rgba(0,0,0,0.12)';
          exportCtx.lineWidth = 1;
          const radius = 16;
          exportCtx.beginPath();
          exportCtx.moveTo(left + radius, top);
          exportCtx.lineTo(left + width - radius, top);
          exportCtx.quadraticCurveTo(left + width, top, left + width, top + radius);
          exportCtx.lineTo(left + width, top + height - radius);
          exportCtx.quadraticCurveTo(left + width, top + height, left + width - radius, top + height);
          exportCtx.lineTo(left + radius, top + height);
          exportCtx.quadraticCurveTo(left, top + height, left, top + height - radius);
          exportCtx.lineTo(left, top + radius);
          exportCtx.quadraticCurveTo(left, top, left + radius, top);
          exportCtx.closePath();
          exportCtx.fill();
          exportCtx.stroke();

          const title = note.querySelector('.note-title').textContent;
          const text = note.querySelector('.note-body').value;
          exportCtx.fillStyle = 'rgba(0,0,0,0.72)';
          exportCtx.font = '700 11px Satoshi, sans-serif';
          exportCtx.textTransform = 'uppercase';
          exportCtx.fillText(title, left + 14, top + 18);
          exportCtx.font = '16px Satoshi, sans-serif';
          const lines = [];
          const words = text.split(/\s+/);
          let line = '';
          for (const word of words) {
            const test = line ? line + ' ' + word : word;
            if (exportCtx.measureText(test).width > width - 28) {
              lines.push(line);
              line = word;
            } else {
              line = test;
            }
          }
          if (line) lines.push(line);
          lines.slice(0, Math.floor((height - 48) / 20)).forEach((content, index) => {
            exportCtx.fillText(content, left + 14, top + 44 + index * 20);
          });
        }

        const link = document.createElement('a');
        link.href = exportCanvas.toDataURL('image/png');
        link.download = `whiteboard-notes-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.png`;
        link.click();
      });

      canvas.addEventListener('pointerdown', (event) => {
        clearSelection();
        beginStroke(event);
      });
      canvas.addEventListener('pointermove', drawStroke);
      canvas.addEventListener('pointerup', endStroke);
      canvas.addEventListener('pointerleave', (event) => { if (drawing) endStroke(event); });
      canvas.addEventListener('pointercancel', (event) => { if (drawing) endStroke(event); });

      shell.addEventListener('click', (event) => {
        if (currentTool !== 'note') return;
        if (event.target.closest('.note')) return;
        const rect = shell.getBoundingClientRect();
        createNote(event.clientX - rect.left, event.clientY - rect.top);
      });

      notesLayer.addEventListener('pointermove', moveNote);
      notesLayer.addEventListener('pointerup', endMoveNote);
      notesLayer.addEventListener('pointercancel', endMoveNote);
      notesLayer.addEventListener('pointerdown', (event) => {
        if (!event.target.closest('.note')) clearSelection();
      });

      window.addEventListener('keydown', (event) => {
        const activeTag = document.activeElement?.tagName;
        const typing = activeTag === 'TEXTAREA' || activeTag === 'INPUT';
        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && key === 'z') {
          event.preventDefault();
          undoBtn.click();
          return;
        }
        if (typing) return;
        if (key === 'p') setTool('pen');
        if (key === 'e') setTool('eraser');
        if (key === 'n') setTool('note');
        if (key === 'delete' && selectedNote) {
          selectedNote.remove();
          clearSelection();
        }
      });

      const resizeObserver = new ResizeObserver(() => resizeCanvas());
      resizeObserver.observe(shell);

      sizeValue.textContent = `${currentSize} px`;
      setStatus();
      setNoteColor(currentNoteColor);
      resizeCanvas();
    })();
  </script>
</body>
</html>
