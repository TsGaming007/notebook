<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiteboard</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #edeae5;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 8px 24px oklch(0.2 0.01 80 / 0.10);
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #22211f;
      --color-border: #393836;
      --color-divider: #262523;
      --color-text: #cdccca;
      --color-text-muted: #979691;
      --color-text-inverse: #171614;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #313b3b;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 8px 24px oklch(0 0 0 / 0.35);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #171614;
        --color-surface: #1c1b19;
        --color-surface-2: #201f1d;
        --color-surface-offset: #22211f;
        --color-border: #393836;
        --color-divider: #262523;
        --color-text: #cdccca;
        --color-text-muted: #979691;
        --color-text-inverse: #171614;
        --color-primary: #4f98a3;
        --color-primary-hover: #227f8b;
        --color-primary-highlight: #313b3b;
        --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
        --shadow-md: 0 8px 24px oklch(0 0 0 / 0.35);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    html {
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-text);
      background: radial-gradient(circle at top left, color-mix(in oklab, var(--color-primary) 6%, var(--color-bg)), var(--color-bg) 32%);
    }
    button, input {
      font: inherit;
      color: inherit;
    }
    button {
      border: 0;
      background: none;
      cursor: pointer;
      transition: transform var(--transition-interactive), background var(--transition-interactive), color var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: color-mix(in oklab, var(--color-surface) 88%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-right: auto;
      min-width: 11rem;
    }
    .brand-logo {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--color-primary-highlight), color-mix(in oklab, var(--color-primary) 25%, var(--color-surface-2)));
      color: var(--color-primary);
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--color-primary) 18%, transparent);
      flex: 0 0 auto;
    }
    .brand-text strong {
      display: block;
      font-size: var(--text-sm);
      line-height: 1.1;
    }
    .brand-text span {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
    }
    .group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      background: var(--color-surface-2);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .tool-btn, .action-btn, .theme-btn {
      min-width: 2.75rem;
      min-height: 2.75rem;
      padding: 0 var(--space-3);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-text);
    }
    .tool-btn.active,
    .action-btn.primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }
    .action-btn {
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      background: var(--color-surface);
    }
    .theme-btn {
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      background: var(--color-surface);
    }

    .swatch {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 2px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }
    .swatch.active { border-color: var(--color-primary); }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding-inline: var(--space-2);
    }
    .range-wrap span {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    input[type="range"] {
      accent-color: var(--color-primary);
      width: 9rem;
    }

    .stage {
      position: relative;
      overflow: hidden;
      padding: clamp(var(--space-3), 1vw, var(--space-4));
    }
    .canvas-shell {
      position: relative;
      height: 100%;
      min-height: 18rem;
      border-radius: calc(var(--radius-lg) + var(--space-1));
      background:
        linear-gradient(var(--color-divider) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-divider) 1px, transparent 1px),
        var(--color-surface);
      background-size: 24px 24px, 24px 24px, auto;
      border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .status {
      position: absolute;
      right: var(--space-4);
      bottom: var(--space-4);
      display: flex;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-2) var(--space-3);
      background: color-mix(in oklab, var(--color-surface-2) 92%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .kbd {
      padding: 0.1rem 0.45rem;
      border-radius: var(--radius-sm);
      background: var(--color-surface-offset);
      color: var(--color-text);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .toolbar { align-items: flex-start; }
      .brand { width: 100%; margin-right: 0; }
      .controls { width: 100%; }
      .group { width: 100%; justify-content: flex-start; overflow-x: auto; }
      .status { left: var(--space-4); right: auto; max-width: calc(100% - 2rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="brand" aria-label="Whiteboard app name">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Whiteboard logo">
            <rect x="3.5" y="4" width="17" height="12.5" rx="2.5"></rect>
            <path d="M7 20h10"></path>
            <path d="M12 16.5V20"></path>
            <path d="M7.5 8.5c1.5-1.4 3.6-1.4 5.1 0l.3.3c1.5 1.4 3.6 1.4 5.1 0"></path>
          </svg>
        </div>
        <div class="brand-text">
          <strong>Whiteboard</strong>
          <span>Draw, erase, undo, export.</span>
        </div>
      </div>

      <div class="controls" aria-label="Whiteboard controls">
        <div class="group" role="toolbar" aria-label="Drawing tools">
          <button class="tool-btn active" data-tool="pen" aria-pressed="true" title="Pen (P)">Pen</button>
          <button class="tool-btn" data-tool="eraser" aria-pressed="false" title="Eraser (E)">Erase</button>
        </div>

        <div class="group" role="toolbar" aria-label="Colors">
          <button class="swatch active" data-color="#111111" style="background:#111111" aria-label="Black color"></button>
          <button class="swatch" data-color="#01696f" style="background:#01696f" aria-label="Teal color"></button>
          <button class="swatch" data-color="#006494" style="background:#006494" aria-label="Blue color"></button>
          <button class="swatch" data-color="#964219" style="background:#964219" aria-label="Brown color"></button>
          <button class="swatch" data-color="#a13544" style="background:#a13544" aria-label="Red color"></button>
          <button class="swatch" data-color="#437a22" style="background:#437a22" aria-label="Green color"></button>
        </div>

        <div class="group" aria-label="Brush size">
          <label class="range-wrap">
            <span>Size</span>
            <input id="sizeRange" type="range" min="2" max="32" value="4" />
            <span id="sizeValue">4 px</span>
          </label>
        </div>

        <div class="group" role="toolbar" aria-label="Actions">
          <button class="action-btn" id="undoBtn" title="Undo (Ctrl/Cmd+Z)">Undo</button>
          <button class="action-btn" id="clearBtn" title="Clear board">Clear</button>
          <button class="action-btn primary" id="downloadBtn" title="Download PNG">Download</button>
          <button class="theme-btn" id="themeToggle" data-theme-toggle aria-label="Switch theme" title="Toggle theme"></button>
        </div>
      </div>
    </header>

    <main class="stage">
      <h1 class="sr-only">Downloadable whiteboard</h1>
      <div class="canvas-shell">
        <canvas id="board"></canvas>
        <div class="status">
          <span id="statusText">Pen ready</span>
          <span class="kbd">P</span>
          <span class="kbd">E</span>
          <span class="kbd">Ctrl+Z</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    (() => {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const paintThemeIcon = () => {
        toggle.innerHTML = theme === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        toggle.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
      };
      html.setAttribute('data-theme', theme);
      paintThemeIcon();
      toggle.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', theme);
        paintThemeIcon();
      });

      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');
      const sizeRange = document.getElementById('sizeRange');
      const sizeValue = document.getElementById('sizeValue');
      const statusText = document.getElementById('statusText');
      const undoBtn = document.getElementById('undoBtn');
      const clearBtn = document.getElementById('clearBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const toolButtons = [...document.querySelectorAll('[data-tool]')];
      const swatches = [...document.querySelectorAll('[data-color]')];
      const shell = document.querySelector('.canvas-shell');

      let currentTool = 'pen';
      let currentColor = '#111111';
      let currentSize = Number(sizeRange.value);
      let drawing = false;
      let history = [];
      let pointerId = null;

      const setStatus = () => {
        statusText.textContent = currentTool === 'eraser'
          ? `Eraser · ${currentSize}px`
          : `Pen · ${currentSize}px · ${currentColor.toUpperCase()}`;
      };

      const resizeCanvas = () => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = shell.getBoundingClientRect();
        const snapshot = canvas.width ? canvas.toDataURL('image/png') : null;
        canvas.width = Math.floor(rect.width * ratio);
        canvas.height = Math.floor(rect.height * ratio);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (snapshot) {
          const img = new Image();
          img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
          img.src = snapshot;
        } else {
          fillWhiteBackground();
          saveState();
        }
      };

      const fillWhiteBackground = () => {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      };

      const saveState = () => {
        history.push(canvas.toDataURL('image/png'));
        if (history.length > 40) history.shift();
        undoBtn.disabled = history.length <= 1;
      };

      const restoreState = (dataUrl) => {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        img.src = dataUrl;
      };

      const getPoint = (event) => {
        const rect = canvas.getBoundingClientRect();
        return { x: event.clientX - rect.left, y: event.clientY - rect.top };
      };

      const beginStroke = (event) => {
        if (pointerId !== null && event.pointerId !== pointerId) return;
        pointerId = event.pointerId;
        drawing = true;
        const { x, y } = getPoint(event);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineWidth = currentSize;
        ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;
        canvas.setPointerCapture(pointerId);
      };

      const drawStroke = (event) => {
        if (!drawing || event.pointerId !== pointerId) return;
        const { x, y } = getPoint(event);
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const endStroke = (event) => {
        if (!drawing || event.pointerId !== pointerId) return;
        drawing = false;
        ctx.closePath();
        saveState();
        canvas.releasePointerCapture(pointerId);
        pointerId = null;
      };

      const setTool = (tool) => {
        currentTool = tool;
        toolButtons.forEach((btn) => {
          const active = btn.dataset.tool === tool;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-pressed', String(active));
        });
        setStatus();
      };

      const setColor = (color) => {
        currentColor = color;
        swatches.forEach((btn) => btn.classList.toggle('active', btn.dataset.color === color));
        if (currentTool !== 'pen') setTool('pen');
        setStatus();
      };

      toolButtons.forEach((btn) => btn.addEventListener('click', () => setTool(btn.dataset.tool)));
      swatches.forEach((btn) => btn.addEventListener('click', () => setColor(btn.dataset.color)));

      sizeRange.addEventListener('input', () => {
        currentSize = Number(sizeRange.value);
        sizeValue.textContent = `${currentSize} px`;
        setStatus();
      });

      undoBtn.addEventListener('click', () => {
        if (history.length <= 1) return;
        history.pop();
        restoreState(history[history.length - 1]);
        undoBtn.disabled = history.length <= 1;
      });

      clearBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fillWhiteBackground();
        saveState();
      });

      downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `whiteboard-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.png`;
        link.click();
      });

      canvas.addEventListener('pointerdown', beginStroke);
      canvas.addEventListener('pointermove', drawStroke);
      canvas.addEventListener('pointerup', endStroke);
      canvas.addEventListener('pointerleave', (event) => {
        if (drawing) endStroke(event);
      });
      canvas.addEventListener('pointercancel', (event) => {
        if (drawing) endStroke(event);
      });

      window.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && key === 'z') {
          event.preventDefault();
          undoBtn.click();
          return;
        }
        if (key === 'p') setTool('pen');
        if (key === 'e') setTool('eraser');
      });

      const resizeObserver = new ResizeObserver(() => resizeCanvas());
      resizeObserver.observe(shell);

      sizeValue.textContent = `${currentSize} px`;
      setStatus();
      resizeCanvas();
    })();
  </script>
</body>
</html>
