<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Φαινομενολογία · Μερεολογία</title>
  
  <!-- React and ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts for Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* Global Styles & Animations */
    :root {
      --bg: #0B0E14;
      --surface: #151923;
      --border: #232A3B;
      --accent: #4F8EF7;
      --accent-hover: #3b74d6;
      --accent2: #8B6CE0;
      --green: #3ECFA4;
      --green-hover: #2db38a;
      --amber: #F0B429;
      --red: #F87171;
      --text: #E2E8F0;
      --muted: #8492A6;
      --code-bg: #1A1F2E;
      
      --font-mono: 'Fira Code', monospace;
      --font-serif: 'Lora', serif;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    * { box-sizing: border-box; }

    /* Interactive Elements Hover States */
    .btn {
      transition: all 0.2s ease;
    }
    .btn:hover:not(:disabled) {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .removable-tag {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .removable-tag:hover {
      border-color: var(--red) !important;
      color: var(--red) !important;
      background-color: rgba(248, 113, 113, 0.1) !important;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeIn 0.3s ease forwards;
    }

    /* Responsive Grid */
    @media (max-width: 600px) {
      .grid-2col { grid-template-columns: 1fr !important; }
      .obj-grid { grid-template-columns: 1fr !important; }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Μερεολογική Λογική (husserl_mereology_live.jsx core) ───────────────
    class MereologicalDomain {
      constructor(objects) {
        this.objects = new Set(objects);
        this.partOf = new Set();
        for (const x of this.objects) this.partOf.add(`${x}|${x}`);
      }
      addPart(a, b) {
        this.partOf.add(`${a}|${b}`);
        this._closeTransitivity();
      }
      P(a, b) { return this.partOf.has(`${a}|${b}`); }
      checkReflexivity() { return [...this.objects].every(x => this.P(x, x)); }
      checkAntisymmetry() {
        for (const a of this.objects)
          for (const b of this.objects)
            if (this.P(a, b) && this.P(b, a) && a !== b) return false;
        return true;
      }
      checkTransitivity() {
        for (const a of this.objects)
          for (const b of this.objects)
            for (const c of this.objects)
              if (this.P(a, b) && this.P(b, c) && !this.P(a, c)) return false;
        return true;
      }
      isMoment(a, b) { return this.P(a, b) && a !== b; }
      isPiece(a, b) {
        if (!this.P(a, b)) return false;
        return !this.P(b, a) || a === b;
      }
      momentsOf(x) { return [...this.objects].filter(a => this.isMoment(a, x)); }
      piecesOf(x) { return [...this.objects].filter(a => this.isPiece(a, x)); }
      getAllPairs() {
        const result = [];
        for (const k of this.partOf) {
          const [a, b] = k.split("|");
          result.push({ a, b, identity: a === b });
        }
        return result.sort((x, y) => x.a.localeCompare(y.a));
      }
      _closeTransitivity() {
        let changed = true;
        while (changed) {
          changed = false;
          const newPairs = new Set();
          for (const k1 of this.partOf) {
            const [a, b] = k1.split("|");
            for (const k2 of this.partOf) {
              const [b2, c] = k2.split("|");
              if (b === b2 && !this.partOf.has(`${a}|${c}`)) {
                newPairs.add(`${a}|${c}`); changed = true;
              }
            }
          }
          for (const p of newPairs) this.partOf.add(p);
        }
      }
    }

    // ── Components ────────────────────────────────────────────────────────────
    function Tag({ children, color }) {
      return (
        <span style={{
          display: "inline-block",
          background: `var(--${color}22, ${color}22)`,
          color: color,
          border: `1px solid ${color}44`,
          borderRadius: 6,
          fontSize: 12,
          padding: "2px 8px",
          fontFamily: "var(--font-mono)",
          fontWeight: 600,
        }}>{children}</span>
      );
    }

    function Formula({ f }) {
      return (
        <div className="animate-in" style={{
          background: "var(--code-bg)",
          border: "1px solid var(--border)",
          borderLeft: "3px solid var(--accent)",
          borderRadius: "0 6px 6px 0",
          padding: "12px 20px",
          margin: "12px 0",
          fontFamily: "var(--font-mono)",
          fontSize: 14,
          color: "var(--accent)",
        }}>{f}</div>
      );
    }

    function SectionTitle({ n, title }) {
      return (
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, margin: "36px 0 16px" }}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--accent2)", fontWeight: 600 }}>
            {String(n).padStart(2, "0")}
          </span>
          <h2 style={{ margin: 0, fontSize: 18, fontWeight: 600, color: "var(--text)", fontFamily: "var(--font-serif)" }}>
            {title}
          </h2>
        </div>
      );
    }

    function CheckRow({ label, ok }) {
      return (
        <div style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "10px 16px",
          background: "var(--code-bg)",
          border: "1px solid var(--border)",
          borderRadius: 8,
          marginBottom: 6,
        }}>
          <span style={{ fontSize: 16, color: ok ? "var(--green)" : "var(--red)" }}>{ok ? "✓" : "✗"}</span>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--text)", flex: 1 }}>{label}</span>
          <Tag color={ok ? "var(--green)" : "var(--red)"}>{ok ? "ΑΛΗΘΕΣ" : "ΨΕΥΔΕΣ"}</Tag>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [objects, setObjects] = useState(["D", "A", "B"]);
      const [relations, setRelations] = useState([["A","D"],["B","D"]]);
      const [newObj, setNewObj] = useState("");
      const [newA, setNewA] = useState("");
      const [newB, setNewB] = useState("");
      const [highlight, setHighlight] = useState(null);

      const domain = new MereologicalDomain(objects);
      for (const [a, b] of relations) domain.addPart(a, b);

      const axioms = [
        { label: "Αναστοχαστικότητα: ∀a: P(a,a)", ok: domain.checkReflexivity() },
        { label: "Αντισυμμετρία: P(a,β) ∧ P(β,a) → a=β", ok: domain.checkAntisymmetry() },
        { label: "Μεταβατικότητα: P(a,β) ∧ P(β,γ) → P(a,γ)", ok: domain.checkTransitivity() },
      ];
      const allOk = axioms.every(a => a.ok);
      const pairs = domain.getAllPairs();

      // State Validators
      const isObjValid = newObj.trim() !== "" && !objects.includes(newObj.trim().toUpperCase());
      const isRelValid = newA !== "" && newB !== "" && newA !== newB;

      // Actions
      function addObject() {
        if (isObjValid) {
          setObjects([...objects, newObj.trim().toUpperCase()]);
          setNewObj("");
        }
      }
      
      function removeObject(objToRemove) {
        setObjects(objects.filter(o => o !== objToRemove));
        // Cascading delete: remove any relations containing this object
        setRelations(relations.filter(([a, b]) => a !== objToRemove && b !== objToRemove));
        if (newA === objToRemove) setNewA("");
        if (newB === objToRemove) setNewB("");
      }

      function addRelation() {
        if (isRelValid) {
          // Prevent exact duplicate relations
          const exists = relations.some(([a, b]) => a === newA && b === newB);
          if (!exists) setRelations([...relations, [newA, newB]]);
          setNewA(""); setNewB("");
        }
      }

      function removeRelation(indexToRemove) {
        setRelations(relations.filter((_, i) => i !== indexToRemove));
      }

      function reset() {
        setObjects(["D","A","B"]); 
        setRelations([["A","D"],["B","D"]]);
        setNewObj(""); setNewA(""); setNewB(""); setHighlight(null);
      }

      // Reusable Styles
      const inputStyle = {
        background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6,
        color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: 13,
        padding: "8px 12px", outline: "none", width: "100%",
        transition: "border 0.2s"
      };

      const btnStyle = (colorVar) => ({
        background: `rgba(var(--${colorVar}-rgb, 255,255,255), 0.1)`, 
        backgroundColor: `var(--${colorVar})`,
        color: "#fff", 
        fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 600,
        padding: "8px 16px", borderRadius: 6, border: "none", cursor: "pointer",
        whiteSpace: "nowrap",
      });

      return (
        <div style={{ minHeight: "100vh", padding: "40px 24px", maxWidth: 760, margin: "0 auto" }}>

          {/* ── Header ── */}
          <div className="animate-in" style={{ borderBottom: "1px solid var(--border)", paddingBottom: 24, marginBottom: 12 }}>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--accent2)", 
                          letterSpacing: "0.15em", marginBottom: 8, fontWeight: 600 }}>
              ΦΑΙΝΟΜΕΝΟΛΟΓΙΑ · ΜΕΡΕΟΛΟΓΙΑ
            </div>
            <h1 style={{ margin: 0, fontSize: 28, fontWeight: 600, color: "var(--text)", 
                         lineHeight: 1.3, fontFamily: "var(--font-serif)" }}>
              Τυπική Μερεολογική Οντολογία
            </h1>
            <div style={{ marginTop: 8, fontSize: 14, color: "var(--muted)" }}>
              Edmund Husserl — Γ΄ Λογική Έρευνα (1901)
            </div>
          </div>

          {/* ── Αξιώματα ── */}
          <SectionTitle n={1} title="Αξιώματα της Σχέσης Μέρους P(a, β)" />
          <div style={{ fontSize: 14, color: "var(--muted)", marginBottom: 16 }}>
            Η σχέση <span style={{ fontFamily: "var(--font-mono)", color: "var(--accent)", background: "var(--code-bg)", padding: "2px 6px", borderRadius: 4 }}>P(a, β)</span> — «το <em>a</em> είναι
            μέρος του <em>β</em>» — ορίζει μερική διάταξη μέσω τριών αξιωμάτων:
          </div>
          <Formula f="∀a: P(a, a)   [Αναστοχαστικότητα]" />
          <Formula f="∀a ∀β: [P(a,β) ∧ P(β,a)] → a=β   [Αντισυμμετρία]" />
          <Formula f="∀a ∀β ∀γ: [P(a,β) ∧ P(β,γ)] → P(a,γ)   [Μεταβατικότητα]" />

          {/* ── Ορισμοί ── */}
          <SectionTitle n={2} title="Παράγωγοι Ορισμοί: Στιγμή & Τμήμα" />
          <div className="grid-2col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {[
              { label: "Στιγμή (Σ)", sub: "Μη-Αυτόνομο Μέρος", f: "Σ(a,β) ↔ P(a,β) ∧ F(a,β)", desc: "Εξαρτάται αναγκαστικά από το σύνολο — δεν υπάρχει χωρίς αυτό.", color: "var(--accent)" },
              { label: "Τμήμα (T)", sub: "Αυτόνομο Μέρος", f: "T(a,β) ↔ P(a,β) ∧ ¬F(a,β)", desc: "Διατηρεί οντολογική αυτάρκεια — μπορεί να υπάρξει ανεξάρτητα.", color: "var(--green)" },
            ].map(({ label, sub, f, desc, color }) => (
              <div key={label} style={{
                background: "var(--surface)", border: "1px solid var(--border)",
                borderRadius: 12, padding: 20,
              }}>
                <div style={{ fontWeight: 600, color, fontSize: 16, marginBottom: 4, fontFamily: "var(--font-serif)" }}>{label}</div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--muted)", marginBottom: 12 }}>{sub}</div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: color, background: "var(--bg)",
                              padding: "8px 12px", borderRadius: 6, marginBottom: 12, border: "1px solid var(--border)" }}>{f}</div>
                <div style={{ fontSize: 13, color: "var(--muted)" }}>{desc}</div>
              </div>
            ))}
          </div>

          {/* ── Live demo ── */}
          <SectionTitle n={3} title="Διαδραστική Επαλήθευση" />

          <div style={{ background: "var(--surface)", border: "1px solid var(--border)",
                        borderRadius: 12, padding: 24, marginBottom: 24 }}>

            {/* Αντικείμενα Editor */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--muted)", marginBottom: 12,
                            letterSpacing: "0.05em" }}>1. ΟΡΙΣΜΟΣ ΑΝΤΙΚΕΙΜΕΝΩΝ</div>
              
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                {objects.map(o => (
                  <span key={o} className="removable-tag" 
                    onClick={() => removeObject(o)}
                    onMouseEnter={() => setHighlight(o)} 
                    onMouseLeave={() => setHighlight(null)}
                    style={{
                      background: highlight === o ? "var(--accent)" : "var(--code-bg)",
                      border: `1px solid ${highlight === o ? "var(--accent)" : "var(--border)"}`,
                      color: highlight === o ? "#fff" : "var(--text)",
                      borderRadius: 6, padding: "6px 12px",
                      fontFamily: "var(--font-mono)", fontSize: 14, fontWeight: 600,
                      display: "flex", alignItems: "center", gap: 8
                    }}>
                    {o}
                    <span style={{ fontSize: 16, opacity: 0.5, fontWeight: 400 }}>×</span>
                  </span>
                ))}
              </div>
              
              <div style={{ display: "flex", gap: 10 }}>
                <input value={newObj} onChange={e => setNewObj(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addObject()}
                  placeholder="Νέο (π.χ. C)" style={{ ...inputStyle, maxWidth: 140 }} />
                <button className="btn" onClick={addObject} disabled={!isObjValid} style={btnStyle('accent')}>
                  + Προσθήκη
                </button>
              </div>
            </div>

            <hr style={{ border: 0, borderTop: "1px solid var(--border)", margin: "20px 0" }}/>

            {/* Σχέσεις Editor */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--muted)", marginBottom: 12,
                            letterSpacing: "0.05em" }}>2. ΟΡΙΣΜΟΣ ΣΧΕΣΕΩΝ P(a, β)</div>
              
              <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
                <select value={newA} onChange={e => setNewA(e.target.value)} style={{ ...inputStyle, maxWidth: 100 }}>
                  <option value="" disabled>a</option>
                  {objects.map(o => <option key={o}>{o}</option>)}
                </select>
                <span style={{ color: "var(--muted)", fontFamily: "var(--font-mono)", fontSize: 13 }}>→ μέρος του →</span>
                <select value={newB} onChange={e => setNewB(e.target.value)} style={{ ...inputStyle, maxWidth: 100 }}>
                  <option value="" disabled>β</option>
                  {objects.map(o => <option key={o}>{o}</option>)}
                </select>
                <button className="btn" onClick={addRelation} disabled={!isRelValid} style={btnStyle('green')}>
                  + Σύνδεση
                </button>
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {relations.length === 0 && <span style={{ color: "var(--muted)", fontSize: 13, fontStyle: "italic" }}>Καμία σχέση δεν έχει οριστεί.</span>}
                {relations.map(([a,b], i) => (
                  <span key={i} className="removable-tag animate-in" onClick={() => removeRelation(i)} style={{
                    background: "var(--bg)", border: "1px solid var(--border)",
                    color: "var(--text)", borderRadius: 6, padding: "6px 12px",
                    fontFamily: "var(--font-mono)", fontSize: 13,
                    display: "flex", alignItems: "center", gap: 8
                  }}>
                    P({a},{b})
                    <span style={{ fontSize: 16, opacity: 0.5, fontWeight: 400 }}>×</span>
                  </span>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button className="btn" onClick={reset} style={{ ...btnStyle('amber'), background: "transparent", color: "var(--amber)", border: "1px solid var(--amber)" }}>
                ↺ Επαναφορά
              </button>
            </div>
          </div>

          {/* Αποτελέσματα αξιωμάτων */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--muted)", letterSpacing: "0.05em",
                          marginBottom: 12 }}>ΕΛΕΓΧΟΣ ΑΞΙΩΜΑΤΩΝ (ΜΕΡΙΚΗ ΔΙΑΤΑΞΗ)</div>
            {axioms.map(a => <CheckRow key={a.label} label={a.label} ok={a.ok} />)}
            <div style={{
              marginTop: 12, padding: "12px 16px", borderRadius: 8,
              background: allOk ? "rgba(62, 207, 164, 0.1)" : "rgba(248, 113, 113, 0.1)",
              border: `1px solid ${allOk ? "rgba(62, 207, 164, 0.2)" : "rgba(248, 113, 113, 0.2)"}`,
              fontFamily: "var(--font-mono)", fontSize: 13,
              color: allOk ? "var(--green)" : "var(--red)",
            }}>
              {allOk
                ? "✓ Το σύστημα είναι πλήρως συνεπές — η μερική διάταξη επαληθεύεται."
                : "✗ Εντοπίστηκε παραβίαση αξιώματος — το σύστημα δεν αποτελεί έγκυρη μερική διάταξη."}
            </div>
          </div>

          {/* Σχέσεις (κλειστό σύνολο) */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--muted)", letterSpacing: "0.05em",
                          marginBottom: 12 }}>ΠΛΗΡΕΣ ΣΥΝΟΛΟ ΣΧΕΣΕΩΝ (ΜΕΤΑΒΑΤΙΚΟ ΚΛΕΙΣΙΜΟ)</div>
            <div style={{
              background: "var(--code-bg)", border: "1px solid var(--border)", borderRadius: 8,
              padding: "16px", fontFamily: "var(--font-mono)", fontSize: 14, lineHeight: 2,
            }}>
              {pairs.map(({ a, b, identity }, i) => (
                <span key={i} className="animate-in" style={{
                  display: "inline-block", marginRight: 16,
                  color: identity ? "var(--muted)" : "var(--text)",
                }}>
                  P({a},{b}){identity && <span style={{ fontSize: 11, color: "var(--muted)", verticalAlign: "super" }}> id</span>}
                </span>
              ))}
            </div>
          </div>

          {/* Ανάλυση ανά αντικείμενο */}
          <div>
            <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--muted)", letterSpacing: "0.05em",
                          marginBottom: 12 }}>ΑΝΑΛΥΣΗ ΜΕΡΩΝ ΑΝΑ ΑΝΤΙΚΕΙΜΕΝΟ</div>
            <div style={{ display: "grid", gap: 12 }}>
              {objects.length === 0 && <div style={{ color: "var(--muted)", fontStyle: "italic", fontSize: 14 }}>Δεν υπάρχουν αντικείμενα.</div>}
              {objects.map(x => {
                const moments = domain.momentsOf(x);
                const pieces = domain.piecesOf(x).filter(p => p !== x); // Exclude identity from pieces display
                return (
                  <div key={x} className="obj-grid animate-in" style={{
                    background: "var(--surface)", border: "1px solid var(--border)",
                    borderRadius: 8, padding: "16px 20px",
                    display: "grid", gridTemplateColumns: "60px 1fr 1fr", gap: 16,
                    alignItems: "start",
                  }}>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 24, fontWeight: 600, color: "var(--accent)", alignSelf: "center" }}>{x}</span>
                    <div>
                      <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--muted)", marginBottom: 8 }}>ΣΤΙΓΜΕΣ (Σ)</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {moments.length > 0
                          ? moments.map(m => <Tag key={m} color="var(--accent)">{m}</Tag>)
                          : <span style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--muted)" }}>—</span>}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--muted)", marginBottom: 8 }}>ΤΜΗΜΑΤΑ (T)</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {pieces.length > 0
                          ? pieces.map(p => <Tag key={p} color="var(--green)">{p}</Tag>)
                          : <span style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--muted)" }}>—</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ marginTop: 40, borderTop: "1px solid var(--border)", paddingTop: 20,
                        fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--muted)", textAlign: "center" }}>
            Husserl · Logische Untersuchungen · III. Untersuchung (1901)
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
